<!DOCTYPE html>
<!--
  _homepage-studies.html — Swiss grid × integrated 3D.
  Four approaches to the courtgranville.com homepage, each combining a strict
  typographic grid with 3D rendered directly into grid cells (WebGL scissor).
  Scratch exploration — NOT the real site. Safe to delete.
-->
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CG — homepage studies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@400;500;600&display=block" rel="stylesheet">
<style>
  :root {
    --ground: #F4F3EF; --ink: #141414; --accent: #8E1B0E;
    --line: rgba(20,20,20,0.12);
    --serif: 'Playfair Display', Georgia, serif;
    --mono: 'Raleway', ui-monospace, monospace;
    --mx: 3vw;            /* page margin */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { background: var(--ground); color: var(--ink); font-family: var(--mono);
         overflow: hidden; cursor: none; -webkit-font-smoothing: antialiased; }

  #gl { position: fixed; inset: 0; z-index: 0; width: 100%; height: 100%; display: block; }

  /* column guides — the Swiss skeleton. Hidden in view; the 12-col grid still
     governs layout (see #ui). Toggle #guides.show to reveal for development. */
  #guides { position: fixed; inset: 0; z-index: 1; pointer-events: none;
            display: grid; grid-template-columns: repeat(12, 1fr); gap: 0;
            padding: 0 var(--mx); opacity: 0; transition: opacity .8s ease .2s; }
  #guides.show { opacity: 1; }
  #guides.show span { border-left: 1px solid var(--line); }
  #guides.show span:last-child { border-right: 1px solid var(--line); }

  /* content layer */
  #ui { position: fixed; inset: 0; z-index: 2; padding: 2.2rem var(--mx) 2rem;
        display: grid; grid-template-columns: repeat(12, 1fr); grid-template-rows: auto 1fr auto;
        column-gap: 1.5vw; pointer-events: none; }
  #ui * { pointer-events: none; }
  #ui a, #ui .row, #ui button { pointer-events: auto; }

  .lbl { font-size: .6rem; letter-spacing: .24em; text-transform: uppercase; opacity: .55; }
  .lbl .accent, .accent { color: var(--accent); }
  .serif { font-family: var(--serif); }

  /* header */
  .hd { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: baseline;
        padding-bottom: 1rem; border-bottom: 1px solid var(--ink); }
  .hd .mark { font-family: var(--serif); font-weight: 700; font-size: 1.1rem; letter-spacing: .02em; }
  .hd nav { display: flex; gap: 1.6rem; }
  .hd nav a { color: var(--ink); text-decoration: none; font-size: .62rem; letter-spacing: .2em;
              text-transform: uppercase; opacity: .6; transition: opacity .2s, color .2s; }
  .hd nav a:hover { opacity: 1; color: var(--accent); }

  /* footer */
  .ft { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: end;
        font-size: .58rem; letter-spacing: .2em; text-transform: uppercase; opacity: .5;
        border-top: 1px solid var(--line); padding-top: .9rem; }

  /* a 3D cell frame */
  .cell { position: relative; border: 1px solid var(--ink); }
  .cell .tag { position: absolute; top: .6rem; left: .7rem; font-size: .56rem; letter-spacing: .2em;
               text-transform: uppercase; opacity: .6; }
  .cell .tag.r { left: auto; right: .7rem; }
  .cell .cnr { position: absolute; width: 7px; height: 7px; border: 1px solid var(--accent); }
  .cell .cnr.tl{top:-1px;left:-1px;border-right:0;border-bottom:0}
  .cell .cnr.tr{top:-1px;right:-1px;border-left:0;border-bottom:0}
  .cell .cnr.bl{bottom:-1px;left:-1px;border-right:0;border-top:0}
  .cell .cnr.br{bottom:-1px;right:-1px;border-left:0;border-top:0}

  .display { font-family: var(--serif); font-weight: 700; line-height: .92; letter-spacing: -0.01em; }

  /* index table */
  .index { width: 100%; border-collapse: collapse; }
  .index .row { display: grid; grid-template-columns: 2.4rem 1fr 4rem 1fr; align-items: baseline;
                gap: 1rem; padding: .85rem 0; border-bottom: 1px solid var(--line);
                cursor: none; transition: padding-left .25s ease, color .25s; }
  .index .row:hover { padding-left: .8rem; color: var(--accent); }
  .index .row .num { font-size: .6rem; letter-spacing: .1em; opacity: .55; }
  .index .row .ttl { font-family: var(--serif); font-size: 1.4rem; }
  .index .row .yr { font-size: .68rem; letter-spacing: .08em; opacity: .7; font-variant-numeric: tabular-nums; }
  .index .row .cat { font-size: .58rem; letter-spacing: .14em; text-transform: uppercase; opacity: .55; }
  .index .row.active { color: var(--accent); padding-left: .8rem; }
  .index .row.active .cat, .index .row.active .num, .index .row.active .yr { opacity: .9; }

  /* selector */
  .selector { position: fixed; z-index: 4; right: var(--mx); bottom: 1.4rem; display: flex; gap: 1.2rem;
              font-size: .6rem; letter-spacing: .16em; text-transform: uppercase; }
  .selector button { all: unset; cursor: pointer; opacity: .35; transition: opacity .25s, color .25s;
                     padding-bottom: 3px; border-bottom: 1px solid transparent; }
  .selector button:hover { opacity: .75; }
  .selector button.active { opacity: 1; color: var(--accent); border-bottom-color: var(--accent); }
  .selector .idx { opacity: .6; margin-right: .35rem; font-variant-numeric: tabular-nums; }

  #cursor { position: fixed; z-index: 5; top: 0; left: 0; width: 24px; height: 24px; margin: -12px 0 0 -12px;
            border: 1px solid rgba(20,20,20,.4); border-radius: 50%; pointer-events: none; opacity: 0;
            transition: opacity .3s, transform .1s ease; }
  #cursor::after { content:''; position:absolute; inset:50%; width:3px; height:3px; margin:-1.5px 0 0 -1.5px;
                   background: var(--accent); border-radius:50%; }
  #cursor.in { opacity: 1; }
  #err { position: fixed; inset: 1.5rem; z-index: 9; color: var(--accent); font: 13px/1.5 monospace;
         white-space: pre-wrap; display: none; }
</style>
</head>
<body>
  <canvas id="gl"></canvas>
  <div id="guides"></div>
  <div id="ui"></div>
  <nav class="selector" id="selector"></nav>
  <div id="cursor"></div>
  <pre id="err"></pre>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

const GROUND = 0xF4F3EF, INK = 0x141414, ACCENT = 0x8E1B0E;
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

const HERO = '/public/assets/projects/';   // served from repo root; on the Astro site this is /assets/projects/
const PROJECTS = [
  { n:'01', title:'Spider-209',              year:'2022', cat:'Product Design',            img:HERO+'spider-209/04-final-1200.webp',                ar:1200/1600 },
  { n:'02', title:'Universal Phone Case',    year:'2022', cat:'Product Design',            img:HERO+'universal-phone-case/07-final-hero-1200.webp', ar:1200/800  },
  { n:'03', title:'LUMI',                    year:'2023', cat:'Product · Critical Design', img:HERO+'lumi/04-final-hero-1200.webp',                 ar:1200/1800 },
  { n:'04', title:'YourPAL',                 year:'2023', cat:'App · UX/UI · Interaction', img:HERO+'yourpal/04-final-hero-1200.webp',              ar:1200/831  },
  { n:'05', title:'Gravity Wave Backgammon', year:'2024', cat:'Product Design',            img:HERO+'backgammon/07-final-hero-1200.webp',           ar:1200/798  },
  { n:'06', title:'Mantis',                  year:'2026', cat:'Product Design',            img:HERO+'mantis/04-final-hero-1200.webp',               ar:1200/1794 },
  { n:'07', title:'Wave',                    year:'2026', cat:'Product Design',            img:HERO+'wave/03-final-hero-1200.webp',                 ar:1200/803  },
];

// ── renderer / scene / camera ────────────────────────────────────────────────
const glCanvas = document.getElementById('gl');
const renderer = new THREE.WebGLRenderer({ canvas: glCanvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(new THREE.Color(GROUND), 1);
renderer.autoClear = false;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const key = new THREE.DirectionalLight(0xffffff, 0.85); key.position.set(-5, 7, 9); scene.add(key);
const rim = new THREE.DirectionalLight(0xffffff, 0.4);  rim.position.set(6, -3, 4); scene.add(rim);

let modeGroup = new THREE.Group(); scene.add(modeGroup);
let pixelScaleAt1 = 1000;   // round-point size helper (per current cell)

// ── pointer ────────────────────────────────────────────────────────────────────
const pointer = { x: 0, y: 0, ndc: new THREE.Vector2(0, 0), nx: 0, ny: 0, active: false, world: new THREE.Vector3() };
const cursorEl = document.getElementById('cursor');
addEventListener('pointermove', (e) => {
  pointer.x = e.clientX; pointer.y = e.clientY; pointer.active = true;
  cursorEl.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`; cursorEl.classList.add('in');
});
addEventListener('pointerleave', () => { pointer.active = false; cursorEl.classList.remove('in'); });

const ray = new THREE.Raycaster(), planeZ0 = new THREE.Plane(new THREE.Vector3(0,0,1), 0), _q = new THREE.Quaternion();
function pointerLocal(out) { out.copy(pointer.world); modeGroup.getWorldQuaternion(_q); return out.applyQuaternion(_q.invert()); }

// ── glyph sampler (for particle CG) ──────────────────────────────────────────
let _cgSample = null;
function sampleCG() {
  if (_cgSample) return _cgSample;
  const W = 1800, H = 1200, c = document.createElement('canvas'); c.width = W; c.height = H;
  const ctx = c.getContext('2d', { willReadFrequently: true });
  let fs = H * 0.56; const f = s => `700 ${s}px "Playfair Display", Georgia, serif`;
  ctx.font = f(fs); const tw = ctx.measureText('CG').width; if (tw > W*0.86) { fs *= W*0.86/tw; ctx.font = f(fs); }
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#000'; ctx.fillText('CG', W/2, H/2);
  const d = ctx.getImageData(0,0,W,H).data, px=[], py=[]; let minX=W,maxX=0,minY=H,maxY=0;
  for (let y=0;y<H;y++) for (let x=0;x<W;x++) if (d[(y*W+x)*4+3]>80){ px.push(x);py.push(y);
    if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y; }
  _cgSample = { px, py, n:px.length, cx:(minX+maxX)/2, cy:(minY+maxY)/2, gh:maxY-minY };
  return _cgSample;
}
function cgPoints(N, worldH, depth) {
  const s = sampleCG(), sc = worldH/s.gh, a = new Float32Array(N*3);
  const g = () => (Math.random()+Math.random()+Math.random()-1.5)/1.5;
  for (let i=0;i<N;i++){ const p=(Math.random()*s.n)|0;
    a[i*3]=(s.px[p]+Math.random()-0.5-s.cx)*sc; a[i*3+1]=-(s.py[p]+Math.random()-0.5-s.cy)*sc; a[i*3+2]=g()*depth*0.5; }
  return a;
}
function roundPoints() {
  return new THREE.ShaderMaterial({ transparent:true, depthWrite:false,
    uniforms:{ uPixelScale:{value:pixelScaleAt1} },
    vertexShader:`attribute float aSize; attribute vec3 aColor; varying vec3 vColor; uniform float uPixelScale;
      void main(){ vColor=aColor; vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=aSize*(uPixelScale/-mv.z); gl_Position=projectionMatrix*mv; }`,
    fragmentShader:`precision mediump float; varying vec3 vColor;
      void main(){ vec2 d=gl_PointCoord-0.5; float r=length(d); if(r>0.5)discard;
        gl_FragColor=vec4(vColor, smoothstep(0.5,0.36,r)); }` });
}
function inkCol(accentRatio) {
  const ink=new THREE.Color(INK), acc=new THREE.Color(ACCENT);
  return Math.random()<accentRatio ? acc.clone() : ink.clone().offsetHSL(0,0,(Math.random()-0.5)*0.05);
}
function clearGroup(g){ for (const o of [...g.children]){ g.remove(o); o.geometry?.dispose();
  if (Array.isArray(o.material)) o.material.forEach(m=>m.dispose()); else o.material?.dispose(); }
  g.rotation.set(0,0,0); g.position.set(0,0,0); g.scale.set(1,1,1); }

// CG printed onto an off-white card texture (for the Object study)
function cgCardTexture() {
  const S = 1024, c = document.createElement('canvas'); c.width=c.height=S;
  const x = c.getContext('2d');
  x.fillStyle = '#F4F3EF'; x.fillRect(0,0,S,S);
  x.fillStyle = '#141414'; x.textAlign='center'; x.textBaseline='middle';
  x.font = `700 ${S*0.5}px "Playfair Display", Georgia, serif`; x.fillText('CG', S/2, S*0.46);
  x.fillStyle = '#8E1B0E'; x.fillRect(S*0.28, S*0.66, S*0.44, 3);
  x.fillStyle = '#141414'; x.font = `600 ${S*0.028}px "Raleway", sans-serif`;
  x.letterSpacing = '6px'; x.fillText('COURT GRANVILLE', S/2, S*0.72);
  x.font = `400 ${S*0.022}px "Raleway", sans-serif`; x.fillStyle='rgba(20,20,20,.5)';
  x.fillText('MONOGRAM · 001', S/2, S*0.78);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = 4; return t;
}

// ═══ APPROACHES ════════════════════════════════════════════════════════════════
const _v = new THREE.Vector3();
const registry = [];

// 01 — GRID: particle CG anchored in a right-hand grid cell
registry.push({ name:'Grid',
  desc:'The monogram as a particle field, anchored inside one cell of the grid. Cursor parts the ink.',
  camZ: 11,
  build() {
    document.getElementById('ui').innerHTML = `
      <header class="hd"><div class="mark">CG</div>
        <nav><a href="#">Index</a><a href="#">About</a><a href="#">Contact</a></nav></header>
      <section style="grid-column:1/7; align-self:center;">
        <div class="lbl">Portfolio — Madrid — MMXXVI</div>
        <h1 class="display" style="font-size:clamp(2.6rem,7vw,6.6rem); margin:.7rem 0 1.1rem;">Court<br>Granville</h1>
        <p class="lbl" style="opacity:.8; max-width:24rem; line-height:2;">Product &amp; Interaction Designer<br>
          <span class="accent">IE University</span>, Madrid · prev. Brand Strategy</p>
        <p style="margin-top:2.4rem; font-size:.7rem; letter-spacing:.04em; opacity:.65; max-width:22rem; line-height:1.7;">
          A traditionally trained product designer working with code &amp; AI. Selected work, 2022–2026.</p>
      </section>
      <div id="cell" class="cell" style="grid-column:8/13; align-self:stretch; margin:1.4rem 0;">
        <span class="cnr tl"></span><span class="cnr tr"></span><span class="cnr bl"></span><span class="cnr br"></span>
        <span class="tag">Fig. 01 — Monogram</span><span class="tag r accent">Live</span></div>
      <footer class="ft"><span>40.4168° N, 3.7038° W</span><span>Selected Work — Index ↗</span><span>© 2026</span></footer>`;
    const N=22000, home=cgPoints(N,2.3,0.4), pos=new Float32Array(home), vel=new Float32Array(N*3),
          col=new Float32Array(N*3), size=new Float32Array(N);
    for(let i=0;i<N;i++){ const r=7*Math.cbrt(Math.random()), th=Math.random()*6.283, ph=Math.acos(2*Math.random()-1);
      pos[i*3]=r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=r*Math.sin(ph)*Math.sin(th); pos[i*3+2]=r*Math.cos(ph);
      const c=inkCol(0.05); col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b; size[i]=0.03*(1+(Math.random()-0.5)*0.5); }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('aColor',new THREE.BufferAttribute(col,3));
    geo.setAttribute('aSize',new THREE.BufferAttribute(size,1));
    const mat=roundPoints(); const pts=new THREE.Points(geo,mat); pts.frustumCulled=false; modeGroup.add(pts);
    let t=0;
    this.mat = mat;
    this.viewport = document.getElementById('cell');
    this.update = (dt)=>{ t+=dt; mat.uniforms.uPixelScale.value=pixelScaleAt1;
      if(!reduce){ modeGroup.rotation.y=Math.sin(t*0.3)*0.45; modeGroup.rotation.x=Math.sin(t*0.21)*0.07; }
      const have=pointer.active; if(have) pointerLocal(_v);
      const damp=Math.pow(0.86,dt*60), R=0.9, K=26, load=Math.min(t/1.6,1);
      for(let i=0;i<N;i++){ const ix=i*3,iy=ix+1,iz=ix+2; const k=K*(0.15+0.85*Math.min(load*1.5,1));
        vel[ix]+=(home[ix]-pos[ix])*k*dt; vel[iy]+=(home[iy]-pos[iy])*k*dt; vel[iz]+=(home[iz]-pos[iz])*k*dt;
        if(have){ const dx=pos[ix]-_v.x, dy=pos[iy]-_v.y, d2=dx*dx+dy*dy;
          if(d2<R*R){ const d=Math.sqrt(d2)+1e-4, f=30*(1-d/R)*(1-d/R); vel[ix]+=dx/d*f*dt; vel[iy]+=dy/d*f*dt; vel[iz]+=0.5*f*dt; } }
        vel[ix]*=damp; vel[iy]*=damp; vel[iz]*=damp; pos[ix]+=vel[ix]*dt; pos[iy]+=vel[iy]*dt; pos[iz]+=vel[iz]*dt;
        const ex=pos[ix]-home[ix],ey=pos[iy]-home[iy],ez=pos[iz]-home[iz],e2=ex*ex+ey*ey+ez*ez;
        if(e2>1.69){ const sc=1.3/Math.sqrt(e2); pos[ix]=home[ix]+ex*sc; pos[iy]=home[iy]+ey*sc; pos[iz]=home[iz]+ez*sc; } }
      geo.attributes.position.needsUpdate=true; };
  }});

// 02 — OBJECT: a solid, lit monogram card with cursor parallax
registry.push({ name:'Object',
  desc:'The monogram as a solid, lit object — a dimensional card. Cursor tilts it; light does the rest. No particles.',
  camZ: 13,
  build() {
    document.getElementById('ui').innerHTML = `
      <header class="hd"><div class="mark">CG</div>
        <nav><a href="#">Index</a><a href="#">About</a><a href="#">Contact</a></nav></header>
      <section style="grid-column:1/5; align-self:center;">
        <div class="lbl">Fig. 02 — Dimensional Monogram</div>
        <h1 class="display" style="font-size:clamp(2.2rem,5vw,4.4rem); margin:.7rem 0 1rem;">A studio<br>of one.</h1>
        <p style="font-size:.72rem; letter-spacing:.03em; opacity:.7; max-width:18rem; line-height:1.8;">
          Brand, product and interaction — treated as one material. Move the object; the surface answers the light.</p>
        <div class="lbl" style="margin-top:2.6rem;">Matte stock · 100% ink · single accent</div>
      </section>
      <div id="cell" class="cell" style="grid-column:6/13; align-self:stretch; margin:1.4rem 0;">
        <span class="cnr tl"></span><span class="cnr tr"></span><span class="cnr bl"></span><span class="cnr br"></span>
        <span class="tag">Object Study</span><span class="tag r accent">Drag-free · cursor parallax</span></div>
      <footer class="ft"><span>Material — Paper</span><span>Lighting — Key / Rim</span><span>© 2026</span></footer>`;
    const tex = cgCardTexture();
    const geo = new RoundedBoxGeometry(4.0, 5.2, 0.42, 6, 0.16);
    const mat = new THREE.MeshStandardMaterial({ map: tex, color: 0xffffff, roughness: 0.62, metalness: 0.04 });
    const edge = new THREE.MeshStandardMaterial({ color: 0xF4F3EF, roughness: 0.7, metalness: 0 });
    const card = new THREE.Mesh(geo, [mat]); // single material covers all faces
    card.geometry.clearGroups(); card.geometry.addGroup(0, Infinity, 0);
    modeGroup.add(card);
    let t=0; const tgt = new THREE.Vector2(0,0);
    this.viewport = document.getElementById('cell');
    this.update = (dt)=>{ t+=dt;
      const r = this.viewport.getBoundingClientRect();
      tgt.x = pointer.active ? ((pointer.x - (r.left+r.width/2))/r.width) : 0;
      tgt.y = pointer.active ? ((pointer.y - (r.top+r.height/2))/r.height) : 0;
      const baseY = reduce ? 0 : Math.sin(t*0.4)*0.18, baseX = reduce ? 0 : Math.sin(t*0.33)*0.06;
      card.rotation.y += ((tgt.x*0.9 + baseY) - card.rotation.y)*0.08;
      card.rotation.x += ((tgt.y*0.7 + baseX) - card.rotation.x)*0.08;
    };
  }});

// 03 — TYPE: geometric 3D letterforms integrated with a typographic statement
registry.push({ name:'Type',
  desc:'The monogram reduced to geometry — a C and G built from solid arcs, bleeding across the headline grid.',
  camZ: 10,
  build() {
    document.getElementById('ui').innerHTML = `
      <header class="hd"><div class="mark">CG</div>
        <nav><a href="#">Index</a><a href="#">About</a><a href="#">Contact</a></nav></header>
      <section style="grid-column:1/13; align-self:center;">
        <div class="lbl">Discipline</div>
        <h1 class="display" style="font-size:clamp(2.4rem,8.5vw,8rem); margin:.4rem 0;">Design in<br>
          <span style="color:transparent;">three</span> dimension.</h1>
        <p class="lbl" style="margin-top:1.4rem; opacity:.7;">Product · Interaction · Brand — courtgranville.com</p>
      </section>
      <div id="cell" style="grid-column:5/11; grid-row:2; align-self:center; height:100%;"></div>
      <footer class="ft"><span>Geometry — Torus / Tube / Box</span><span>Cursor — Parallax</span><span>© 2026</span></footer>`;
    const ink = new THREE.MeshStandardMaterial({ color: INK, roughness: 0.42, metalness: 0.1 });
    const acc = new THREE.MeshStandardMaterial({ color: ACCENT, roughness: 0.4, metalness: 0.1 });
    // C — open torus arc, gap centred on the right
    const C = new THREE.Mesh(new THREE.TorusGeometry(0.95, 0.28, 28, 100, Math.PI*1.5), ink);
    C.rotation.z = Math.PI*0.25; C.position.x = -1.45;
    // G — same arc + horizontal crossbar + a short red spur
    const G = new THREE.Group();
    const Garc = new THREE.Mesh(new THREE.TorusGeometry(0.95, 0.28, 28, 100, Math.PI*1.5), ink);
    Garc.rotation.z = Math.PI*0.25;
    const Gbar = new THREE.Mesh(new THREE.BoxGeometry(0.74, 0.28, 0.28), ink);
    Gbar.position.set(0.40, -0.04, 0);
    const Gspur = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.52, 0.28), acc);
    Gspur.position.set(0.76, 0.16, 0);
    G.add(Garc, Gbar, Gspur); G.position.x = 1.45;
    modeGroup.add(C, G);
    let t=0; const tgt=new THREE.Vector2();
    this.viewport = document.getElementById('cell');
    this.update = (dt)=>{ t+=dt;
      const r=this.viewport.getBoundingClientRect();
      tgt.x = pointer.active ? (pointer.x-(r.left+r.width/2))/r.width : 0;
      tgt.y = pointer.active ? (pointer.y-(r.top+r.height/2))/r.height : 0;
      const sway = reduce ? 0 : Math.sin(t*0.18)*0.3;
      modeGroup.rotation.y += ((tgt.x*0.55 + sway) - modeGroup.rotation.y)*0.07;
      modeGroup.rotation.x += ((tgt.y*0.4 - 0.04) - modeGroup.rotation.x)*0.07;
    };
  }});

// 04 — INDEX: a Swiss work index; hovering a row wraps that project's hero
//            image over a 3D canvas (cursor parallax, no spin)
registry.push({ name:'Index',
  desc:'A typographic work index. Hover a project and its hero image wraps a 3D canvas that answers the cursor.',
  camZ: 7.5,
  build() {
    const rows = PROJECTS.map((p,i) => `
      <div class="row" data-i="${i}">
        <span class="num">${p.n}</span><span class="ttl">${p.title}</span>
        <span class="yr">${p.year}</span><span class="cat">${p.cat}</span></div>`).join('');
    document.getElementById('ui').innerHTML = `
      <header class="hd"><div class="mark">CG</div>
        <nav><a href="#">Index</a><a href="#">About</a><a href="#">Contact</a></nav></header>
      <section style="grid-column:1/8; align-self:start; padding-top:1.6rem;">
        <div class="lbl" style="margin-bottom:.6rem;">Selected Work — 2022 / 2026</div>
        <div class="index">${rows}</div>
      </section>
      <div style="grid-column:8/13; align-self:start; padding-top:1.6rem;">
        <div id="cell" class="cell" style="aspect-ratio:1/1;">
          <span class="cnr tl"></span><span class="cnr tr"></span><span class="cnr bl"></span><span class="cnr br"></span>
          <span class="tag" id="cellTag">Spider-209</span><span class="tag r accent">Hover index</span></div>
        <p class="lbl" id="cellCat" style="margin-top:.9rem; opacity:.7;">Product Design — 2022</p>
      </div>
      <footer class="ft"><span>07 Projects</span><span>Hero — 3D canvas</span><span>© 2026</span></footer>`;

    const loader = new THREE.TextureLoader();
    const maxAniso = renderer.capabilities.getMaxAnisotropy();
    const texes = PROJECTS.map(p => { const t = loader.load(p.img);
      t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = maxAniso; return t; });
    const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, metalness: 0.0 });
    const card = new THREE.Mesh(new RoundedBoxGeometry(1, 1, 0.14, 5, 0.045), mat);
    modeGroup.add(card);

    const cellEl = document.getElementById('cell');
    const FOV = camera.fov, CAMZ = this.camZ, FILL = 0.9;
    let cur = 0;
    // size the canvas to (almost) fill the framed cell, preserving image aspect
    function fitCard(a){
      const r = cellEl.getBoundingClientRect();
      const vH = 2*CAMZ*Math.tan(FOV*Math.PI/360), vW = vH*(r.width/r.height);
      const h = Math.min(FILL*vH, FILL*vW/a);
      return { w: h*a, h };
    }
    function show(i){ cur = i; const { w, h } = fitCard(PROJECTS[i].ar);
      card.geometry.dispose(); card.geometry = new RoundedBoxGeometry(w, h, 0.14, 5, 0.045);
      mat.map = texes[i]; mat.needsUpdate = true; }

    const rowsEl = [...document.querySelectorAll('.index .row')];
    const tagEl = document.getElementById('cellTag'), catEl = document.getElementById('cellCat');
    function select(i){ rowsEl.forEach(x=>x.classList.remove('active')); rowsEl[i].classList.add('active');
      show(i); tagEl.textContent = PROJECTS[i].title; catEl.textContent = PROJECTS[i].cat+' — '+PROJECTS[i].year; }
    rowsEl.forEach(r => r.addEventListener('pointerenter', ()=> select(+r.dataset.i)));
    select(0);

    const onResize = () => show(cur);
    addEventListener('resize', onResize);
    this.dispose = () => removeEventListener('resize', onResize);

    let t=0; const tgt=new THREE.Vector2();
    this.viewport = cellEl;
    this.update = (dt)=>{ t+=dt;
      const r=this.viewport.getBoundingClientRect();
      tgt.x = pointer.active ? (pointer.x-(r.left+r.width/2))/r.width : 0;
      tgt.y = pointer.active ? (pointer.y-(r.top+r.height/2))/r.height : 0;
      const idY = reduce?0:Math.sin(t*0.4)*0.09, idX = reduce?0:Math.sin(t*0.33)*0.035;
      card.rotation.y += ((tgt.x*0.34 + idY) - card.rotation.y)*0.08;
      card.rotation.x += ((tgt.y*0.26 + idX) - card.rotation.x)*0.08;
    };
  }});

// ── selector / switching ─────────────────────────────────────────────────────
const selectorEl = document.getElementById('selector');
registry.forEach((m,i)=>{ const b=document.createElement('button');
  b.innerHTML = `<span class="idx">0${i+1}</span>${m.name}`; b.onclick=()=>switchTo(i); selectorEl.appendChild(b); });
addEventListener('keydown', e=>{ const n=parseInt(e.key,10); if(n>=1&&n<=registry.length) switchTo(n-1); });

let active=-1, current=null;
function switchTo(i){ if(i===active) return; current?.dispose?.(); clearGroup(modeGroup);
  active=i; current=registry[i]; camera.position.set(0,0,current.camZ); camera.updateProjectionMatrix();
  current.build();
  [...selectorEl.children].forEach((b,k)=>b.classList.toggle('active', k===i));
}

// ── render loop with per-cell scissor ────────────────────────────────────────
function computeViewport(){
  // three.js multiplies viewport/scissor by pixelRatio internally → pass CSS px
  const el = current?.viewport;
  if(!el) return null;
  const r = el.getBoundingClientRect();
  if (r.width < 2 || r.height < 2) return null;
  return { x: r.left, y: innerHeight - r.bottom, w: r.width, h: r.height, aspect: r.width/r.height };
}
function resize(){ renderer.setSize(innerWidth, innerHeight); }
addEventListener('resize', resize);

const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 1/30);
  current?.update?.(dt);

  // pointer → world on z=0 plane, using the active cell's framing
  const vp = computeViewport();
  renderer.setScissorTest(false); renderer.clear();          // full off-white wipe
  if (vp) {
    const PR = renderer.getPixelRatio();
    camera.aspect = vp.aspect; camera.updateProjectionMatrix();
    // point-size helper (drawing-buffer px for a 1-unit sprite at z=1)
    pixelScaleAt1 = (vp.h * PR) / (2*Math.tan(camera.fov*Math.PI/360));
    if (pointer.active){ const el=current.viewport.getBoundingClientRect();
      pointer.ndc.set(((pointer.x-el.left)/el.width)*2-1, -((pointer.y-el.top)/el.height)*2+1);
      ray.setFromCamera(pointer.ndc, camera); ray.ray.intersectPlane(planeZ0, pointer.world); }
    // three.js multiplies viewport/scissor by pixelRatio internally — pass CSS px
    renderer.setScissorTest(true);
    renderer.setViewport(vp.x, vp.y, vp.w, vp.h); renderer.setScissor(vp.x, vp.y, vp.w, vp.h);
    renderer.render(scene, camera);
  }
}

// ── boot ─────────────────────────────────────────────────────────────────────
(async ()=>{
  await document.fonts.load('700 200px "Playfair Display"'); await document.fonts.ready;
  // build column guides (12 spans)
  const g=document.getElementById('guides'); for(let i=0;i<12;i++) g.appendChild(document.createElement('span'));
  resize(); switchTo(0);
  document.getElementById('guides').classList.add('in');
  clock.start(); animate();
})().catch(err=>{ const e=document.getElementById('err'); e.style.display='block'; e.textContent=(err&&err.stack)||String(err); });

window.__hp = { switchTo, get active(){ return active; } };
</script>
