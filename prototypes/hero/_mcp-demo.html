<!DOCTYPE html>
<!--
  _mcp-demo.html — CG interaction studies.
  A scratch gallery of distinct ways the "CG" monogram can become an
  interactive visualisation, built to exercise the three.js + Chrome DevTools
  MCP workflow. This is NOT the real hero prototype (that is index.html).
  Safe to delete.
-->
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CG — interaction studies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@400;500&display=block" rel="stylesheet">
<style>
  :root {
    --ground: #F4F3EF;   /* off-white editorial ground */
    --ink:    #141414;   /* off-black */
    --accent: #8E1B0E;   /* single deep red, used sparingly */
    --serif:  'Playfair Display', Georgia, serif;
    --mono:   'Raleway', ui-monospace, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--ground); color: var(--ink);
    font-family: var(--mono); overflow: hidden; cursor: none;
  }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  #fx { z-index: 1; }            /* 2D layer, shown only for canvas modes */

  .ui { position: fixed; z-index: 3; pointer-events: none; user-select: none;
        opacity: 0; transition: opacity 1s ease 0.3s; }
  .ui.in { opacity: 1; }
  .wordmark { top: 2.1rem; left: 2.4rem; font-family: var(--serif); font-weight: 700;
              font-size: 1.05rem; letter-spacing: 0.02em; }
  .meta { top: 2.3rem; right: 2.4rem; text-align: right; font-size: 0.62rem;
          letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.5; line-height: 1.9; }
  .accent { color: var(--accent); }

  /* mode label, centred above the selector */
  .modeline { bottom: 4.6rem; left: 2.4rem; font-size: 0.7rem; letter-spacing: 0.04em;
              opacity: 0.7; max-width: 30rem; }
  .modeline b { font-family: var(--serif); font-weight: 700; font-size: 1.5rem;
                display: block; letter-spacing: 0.01em; margin-bottom: 0.35rem; opacity: 1; }
  .modeline .num { color: var(--accent); font-weight: 500; }

  /* selector */
  .selector { position: fixed; z-index: 4; left: 2.4rem; bottom: 2rem; display: flex; gap: 1.5rem;
              font-size: 0.64rem; letter-spacing: 0.16em; text-transform: uppercase; }
  .selector button { all: unset; cursor: pointer; color: var(--ink); opacity: 0.38;
                     transition: opacity 0.25s, color 0.25s; padding-bottom: 4px;
                     border-bottom: 1px solid transparent; }
  .selector button:hover { opacity: 0.8; }
  .selector button.active { opacity: 1; color: var(--accent); border-bottom-color: var(--accent); }
  .selector .idx { font-variant-numeric: tabular-nums; opacity: 0.6; margin-right: 0.4rem; }

  #cursor { position: fixed; z-index: 5; top: 0; left: 0; width: 26px; height: 26px;
            margin: -13px 0 0 -13px; border: 1px solid rgba(20,20,20,0.45);
            border-radius: 50%; pointer-events: none; opacity: 0;
            transition: transform 0.1s ease, opacity 0.3s, width 0.2s, height 0.2s; }
  #cursor::after { content: ''; position: absolute; inset: 50%; width: 4px; height: 4px;
                   margin: -2px 0 0 -2px; background: var(--accent); border-radius: 50%; }
  #cursor.in { opacity: 1; }
  #cursor.down { transform: scale(0.7); border-color: var(--accent); }

  #err { position: fixed; inset: 1.5rem; z-index: 9; color: var(--accent);
         font: 13px/1.5 monospace; white-space: pre-wrap; display: none; }
</style>
</head>
<body>
  <canvas id="gl"></canvas>
  <canvas id="fx"></canvas>
  <div id="cursor"></div>

  <div class="ui wordmark" id="ui-wordmark">CG</div>
  <div class="ui meta" id="ui-meta">Court&nbsp;Granville<br>interaction&nbsp;<span class="accent">studies</span></div>
  <div class="ui modeline" id="modeline"></div>
  <nav class="selector ui" id="selector"></nav>
  <pre id="err"></pre>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ── palette ───────────────────────────────────────────────────────────────
const GROUND = 0xF4F3EF, INK = 0x141414, ACCENT = 0x8E1B0E;
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

// ── renderer / scene / camera (shared) ──────────────────────────────────────
const glCanvas = document.getElementById('gl');
const fxCanvas = document.getElementById('fx');
const fx = fxCanvas.getContext('2d');

const renderer = new THREE.WebGLRenderer({ canvas: glCanvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(new THREE.Color(GROUND), 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(32, 1, 0.1, 100);
camera.position.set(0, 0, 15);

// lights (only lit materials — i.e. the cube mode — respond; points ignore them)
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const key = new THREE.DirectionalLight(0xffffff, 0.9); key.position.set(-4, 6, 8); scene.add(key);
const rim = new THREE.DirectionalLight(0xffffff, 0.35); rim.position.set(5, -2, 4); scene.add(rim);

// a fresh group per mode, cleared on switch
let modeGroup = new THREE.Group();
scene.add(modeGroup);

// shared point-size scale (drawing-buffer px for a 1-unit sprite at z=1)
let pixelScale = 1000;

// ── pointer (shared) ─────────────────────────────────────────────────────────
const pointer = { ndc: new THREE.Vector2(-2, -2), world: new THREE.Vector3(9999, 9999, 0),
                  active: false, down: false, x: 0, y: 0 };
const raycaster = new THREE.Raycaster();
const planeZ0 = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
const cursorEl = document.getElementById('cursor');

addEventListener('pointermove', (e) => {
  pointer.x = e.clientX; pointer.y = e.clientY;
  pointer.ndc.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  pointer.active = true;
  raycaster.setFromCamera(pointer.ndc, camera);
  raycaster.ray.intersectPlane(planeZ0, pointer.world);
  cursorEl.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
  cursorEl.classList.add('in');
});
addEventListener('pointerdown', () => { pointer.down = true; cursorEl.classList.add('down'); modes[active]?.onDown?.(); });
addEventListener('pointerup',   () => { pointer.down = false; cursorEl.classList.remove('down'); });
addEventListener('pointerleave',() => { pointer.active = false; cursorEl.classList.remove('in'); });

// world pointer transformed into the (rotation-only) modeGroup's local space
const _q = new THREE.Quaternion();
function pointerLocal(out) {
  out.copy(pointer.world);
  modeGroup.getWorldQuaternion(_q);
  return out.applyQuaternion(_q.invert());
}

// ── glyph sampler (cached) ───────────────────────────────────────────────────
const _cache = new Map();
function sampleGlyph(text) {
  if (_cache.has(text)) return _cache.get(text);
  const W = 2000, H = 1300;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const ctx = c.getContext('2d', { willReadFrequently: true });
  let fs = H * 0.55;
  const font = s => `700 ${s}px "Playfair Display", Georgia, serif`;
  ctx.font = font(fs);
  const tw = ctx.measureText(text).width;
  if (tw > W * 0.86) { fs *= (W * 0.86) / tw; ctx.font = font(fs); }
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#000';
  ctx.fillText(text, W / 2, H / 2);

  const data = ctx.getImageData(0, 0, W, H).data;
  const px = [], py = [];
  let minX = W, maxX = 0, minY = H, maxY = 0;
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    if (data[(y * W + x) * 4 + 3] > 80) {
      px.push(x); py.push(y);
      if (x < minX) minX = x; if (x > maxX) maxX = x;
      if (y < minY) minY = y; if (y > maxY) maxY = y;
    }
  }
  const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2, gh = maxY - minY;
  const out = {
    px, py, n: px.length, cx, cy, gh, W, H, data,
    // random world points (centred, scaled so glyph height = worldH), with depth
    points(N, worldH, depth) {
      const s = worldH / gh, arr = new Float32Array(N * 3);
      const g = () => (Math.random() + Math.random() + Math.random() - 1.5) / 1.5;
      for (let i = 0; i < N; i++) {
        const p = (Math.random() * this.n) | 0;
        arr[i * 3]     = (this.px[p] + Math.random() - 0.5 - cx) * s;
        arr[i * 3 + 1] = -(this.py[p] + Math.random() - 0.5 - cy) * s;
        arr[i * 3 + 2] = g() * depth * 0.5;
      }
      return arr;
    },
    // tidy grid of filled cells → world positions (for cubes)
    grid(stepPx, worldH) {
      const s = worldH / gh, pts = [];
      for (let y = minY; y <= maxY; y += stepPx) for (let x = minX; x <= maxX; x += stepPx) {
        if (data[(y * W + x) * 4 + 3] > 80) pts.push((x - cx) * s, -(y - cy) * s);
      }
      return { pts, worldStep: stepPx * s };
    },
  };
  _cache.set(text, out);
  return out;
}

// ── shared round-point material ──────────────────────────────────────────────
function roundPoints(extra = {}) {
  return new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, depthTest: true,
    uniforms: { uPixelScale: { value: pixelScale }, uOpacity: { value: 1 }, ...extra },
    vertexShader: `
      attribute float aSize; attribute vec3 aColor; varying vec3 vColor;
      uniform float uPixelScale;
      void main(){
        vColor = aColor;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = aSize * (uPixelScale / -mv.z);
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      precision mediump float; varying vec3 vColor; uniform float uOpacity;
      void main(){
        vec2 d = gl_PointCoord - 0.5; float r = length(d);
        if (r > 0.5) discard;
        gl_FragColor = vec4(vColor, smoothstep(0.5, 0.36, r) * uOpacity);
      }`,
  });
}
function inkColor(accentRatio, lightVar) {
  const ink = new THREE.Color(INK), acc = new THREE.Color(ACCENT);
  return Math.random() < accentRatio ? acc.clone()
       : ink.clone().offsetHSL(0, 0, (Math.random() - 0.5) * (lightVar || 0));
}
function clearGroup(g) {
  for (const o of [...g.children]) {
    g.remove(o);
    o.geometry?.dispose();
    if (Array.isArray(o.material)) o.material.forEach(m => m.dispose()); else o.material?.dispose();
  }
  g.rotation.set(0, 0, 0); g.position.set(0, 0, 0); g.visible = true;
}

// ── pseudo-curl flow field (cheap, organic) ──────────────────────────────────
function flow(x, y, z, t, out) {
  out.x = Math.sin(y * 0.9 + t * 0.7) + Math.cos(z * 1.1 - t * 0.5);
  out.y = Math.sin(z * 0.8 + t * 0.6) + Math.cos(x * 1.0 + t * 0.4);
  out.z = (Math.sin(x * 0.7 - t * 0.5) + Math.cos(y * 1.2 + t * 0.3)) * 0.5;
}

// ═════════════════════════════════════════════════════════════════════════════
// MODES
// ═════════════════════════════════════════════════════════════════════════════
const _v = new THREE.Vector3(), _f = new THREE.Vector3();

// 01 — PARTICLE FIELD: ink cloud holds CG, cursor parts it ────────────────────
function modeField() {
  const N = 34000, worldH = 3.1, depth = 0.42;
  const s = sampleGlyph('CG');
  const home = s.points(N, worldH, depth);
  const pos = new Float32Array(home), vel = new Float32Array(N * 3);
  const col = new Float32Array(N * 3), size = new Float32Array(N), rel = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    // scatter start for a load-in
    const r = 8 * Math.cbrt(Math.random()), th = Math.random() * 6.283, ph = Math.acos(2 * Math.random() - 1);
    pos[i*3] = r*Math.sin(ph)*Math.cos(th); pos[i*3+1] = r*Math.sin(ph)*Math.sin(th); pos[i*3+2] = r*Math.cos(ph);
    const c = inkColor(0.05, 0.05); col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
    size[i] = 0.03 * (1 + (Math.random()-0.5)*0.55);
    rel[i] = (home[i*3] / worldH + 1) * 0.5;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('aColor', new THREE.BufferAttribute(col, 3));
  geo.setAttribute('aSize', new THREE.BufferAttribute(size, 1));
  const mat = roundPoints();
  const pts = new THREE.Points(geo, mat); pts.frustumCulled = false; modeGroup.add(pts);
  let t = 0;
  return {
    resize() { mat.uniforms.uPixelScale.value = pixelScale; },
    update(dt) {
      t += dt;
      if (!reduce) { modeGroup.rotation.y = Math.sin(t*0.3)*0.5; modeGroup.rotation.x = Math.sin(t*0.22)*0.08; }
      const havePtr = pointer.active; if (havePtr) pointerLocal(_v);
      const damp = Math.pow(0.86, dt*60), R = 0.95, K = 26, load = Math.min(t/1.7, 1);
      for (let i = 0; i < N; i++) {
        const ix=i*3, iy=ix+1, iz=ix+2;
        const gate = Math.min(Math.max(load*1.85 - rel[i]*0.85, 0), 1);
        const k = K*(0.15 + 0.85*gate);
        vel[ix] += (home[ix]-pos[ix])*k*dt;
        vel[iy] += (home[iy]-pos[iy])*k*dt;
        vel[iz] += (home[iz] + Math.sin(t*0.5+i)*0.012 - pos[iz])*k*dt;
        if (havePtr) {
          const dx=pos[ix]-_v.x, dy=pos[iy]-_v.y, d2=dx*dx+dy*dy;
          if (d2 < R*R) { const d=Math.sqrt(d2)+1e-4, f=34*(1-d/R)*(1-d/R);
            vel[ix]+=dx/d*f*dt; vel[iy]+=dy/d*f*dt; vel[iz]+=0.55*f*dt; }
        }
        vel[ix]*=damp; vel[iy]*=damp; vel[iz]*=damp;
        pos[ix]+=vel[ix]*dt; pos[iy]+=vel[iy]*dt; pos[iz]+=vel[iz]*dt;
        const ex=pos[ix]-home[ix], ey=pos[iy]-home[iy], ez=pos[iz]-home[iz], e2=ex*ex+ey*ey+ez*ez;
        if (e2 > 1.96) { const sc=1.4/Math.sqrt(e2); pos[ix]=home[ix]+ex*sc; pos[iy]=home[iy]+ey*sc; pos[iz]=home[iz]+ez*sc; }
      }
      geo.attributes.position.needsUpdate = true;
    },
  };
}

// 02 — CURL FLOW: living ink smoke, tethered to CG, cursor swirls ─────────────
function modeFlow() {
  const N = 26000, worldH = 3.1, depth = 0.5;
  const s = sampleGlyph('CG');
  const home = s.points(N, worldH, depth);
  const pos = new Float32Array(home), col = new Float32Array(N*3), size = new Float32Array(N);
  for (let i=0;i<N;i++){ const c=inkColor(0.06,0.04); col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;
    size[i]=0.028*(1+(Math.random()-0.5)*0.5); }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('aColor', new THREE.BufferAttribute(col,3));
  geo.setAttribute('aSize', new THREE.BufferAttribute(size,1));
  const mat = roundPoints(); const pts = new THREE.Points(geo,mat); pts.frustumCulled=false; modeGroup.add(pts);
  let t = 0;
  return {
    resize(){ mat.uniforms.uPixelScale.value = pixelScale; },
    update(dt){
      t += dt;
      if (!reduce) modeGroup.rotation.y = Math.sin(t*0.2)*0.35;
      const havePtr = pointer.active; if (havePtr) pointerLocal(_v);
      for (let i=0;i<N;i++){
        const ix=i*3, iy=ix+1, iz=ix+2;
        flow(pos[ix], pos[iy], pos[iz], t, _f);
        // advect + tether back to home so the CG never dissolves
        let vx = _f.x*0.18 + (home[ix]-pos[ix])*2.0;
        let vy = _f.y*0.18 + (home[iy]-pos[iy])*2.0;
        let vz = _f.z*0.18 + (home[iz]-pos[iz])*2.0;
        if (havePtr){ const dx=pos[ix]-_v.x, dy=pos[iy]-_v.y, d2=dx*dx+dy*dy;
          if (d2<1.1){ const d=Math.sqrt(d2)+1e-4; // tangential swirl + slight push
            vx += (-dy/d)*3.2*(1-d/1.05) + dx/d*1.4*(1-d/1.05);
            vy += ( dx/d)*3.2*(1-d/1.05) + dy/d*1.4*(1-d/1.05); } }
        pos[ix]+=vx*dt; pos[iy]+=vy*dt; pos[iz]+=vz*dt;
      }
      geo.attributes.position.needsUpdate = true;
    },
  };
}

// 03 — CONSTELLATION: nodes + lines, cursor is a gravity well ─────────────────
function modeConstellation() {
  const M = 520, worldH = 3.0;
  const s = sampleGlyph('CG');
  const flat = s.points(M, worldH, 0.25);
  const home = new Float32Array(flat), pos = new Float32Array(flat), vel = new Float32Array(M*3);
  const ncol = new Float32Array(M*3), nsize = new Float32Array(M);
  for (let i=0;i<M;i++){ const c=inkColor(0.06,0); ncol[i*3]=c.r;ncol[i*3+1]=c.g;ncol[i*3+2]=c.b; nsize[i]=0.06; }
  // edges: connect each node to up to 3 neighbours within radius (computed once on home)
  const edges = []; const R2 = 0.34*0.34;
  for (let i=0;i<M;i++){ let deg=0;
    for (let j=i+1;j<M && deg<3;j++){
      const dx=home[i*3]-home[j*3], dy=home[i*3+1]-home[j*3+1], dz=home[i*3+2]-home[j*3+2];
      if (dx*dx+dy*dy+dz*dz < R2){ edges.push(i,j); deg++; }
    }
  }
  const nGeo = new THREE.BufferGeometry();
  nGeo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  nGeo.setAttribute('aColor', new THREE.BufferAttribute(ncol,3));
  nGeo.setAttribute('aSize', new THREE.BufferAttribute(nsize,1));
  const nodes = new THREE.Points(nGeo, roundPoints()); nodes.frustumCulled=false; modeGroup.add(nodes);

  const lpos = new Float32Array(edges.length*3); // 2 verts per edge already (edges holds pairs)
  const lGeo = new THREE.BufferGeometry();
  lGeo.setAttribute('position', new THREE.BufferAttribute(lpos,3));
  const lines = new THREE.LineSegments(lGeo, new THREE.LineBasicMaterial({ color: INK, transparent:true, opacity:0.16 }));
  lines.frustumCulled=false; modeGroup.add(lines);
  let t=0;
  return {
    resize(){ nodes.material.uniforms.uPixelScale.value = pixelScale; },
    update(dt){
      t+=dt;
      if (!reduce) modeGroup.rotation.y = Math.sin(t*0.25)*0.45;
      const havePtr=pointer.active; if (havePtr) pointerLocal(_v);
      const damp=Math.pow(0.84,dt*60);
      for (let i=0;i<M;i++){ const ix=i*3,iy=ix+1,iz=ix+2;
        vel[ix]+=(home[ix]-pos[ix])*24*dt; vel[iy]+=(home[iy]-pos[iy])*24*dt; vel[iz]+=(home[iz]-pos[iz])*24*dt;
        if (havePtr){ const dx=_v.x-pos[ix], dy=_v.y-pos[iy], d2=dx*dx+dy*dy;
          if (d2<1.4){ const d=Math.sqrt(d2)+1e-4, f=14*(1-d/1.18); // attraction toward cursor
            vel[ix]+=dx/d*f*dt; vel[iy]+=dy/d*f*dt; } }
        vel[ix]*=damp; vel[iy]*=damp; vel[iz]*=damp;
        pos[ix]+=vel[ix]*dt; pos[iy]+=vel[iy]*dt; pos[iz]+=vel[iz]*dt;
      }
      nGeo.attributes.position.needsUpdate=true;
      for (let e=0;e<edges.length;e++){ const ni=edges[e]; lpos[e*3]=pos[ni*3]; lpos[e*3+1]=pos[ni*3+1]; lpos[e*3+2]=pos[ni*3+2]; }
      lGeo.attributes.position.needsUpdate=true;
    },
  };
}

// 04 — RELIEF: instanced cubes, cursor lifts a wave ──────────────────────────
function modeRelief() {
  const worldH = 3.0;
  const s = sampleGlyph('CG');
  const { pts, worldStep } = s.grid(11, worldH);
  const N = pts.length / 2;
  const geo = new THREE.BoxGeometry(worldStep*0.82, worldStep*0.82, worldStep*0.82);
  const mat = new THREE.MeshStandardMaterial({ roughness: 0.55, metalness: 0.0 });
  const mesh = new THREE.InstancedMesh(geo, mat, N); mesh.frustumCulled = false;
  const baseX = new Float32Array(N), baseY = new Float32Array(N);
  const dummy = new THREE.Object3D();
  const cInk = new THREE.Color(0x232323), cAcc = new THREE.Color(ACCENT);
  for (let i=0;i<N;i++){ baseX[i]=pts[i*2]; baseY[i]=pts[i*2+1];
    dummy.position.set(baseX[i], baseY[i], 0); dummy.updateMatrix(); mesh.setMatrixAt(i, dummy.matrix);
    mesh.setColorAt(i, Math.random()<0.04 ? cAcc : cInk);
  }
  modeGroup.add(mesh);
  let t=0;
  return {
    resize(){},
    update(dt){
      t+=dt;
      if (!reduce){ modeGroup.rotation.y = Math.sin(t*0.25)*0.5; modeGroup.rotation.x = -0.12 + Math.sin(t*0.2)*0.05; }
      const havePtr=pointer.active; if (havePtr) pointerLocal(_v);
      for (let i=0;i<N;i++){
        let z = 0.04 + Math.sin(t*1.2 + baseX[i]*1.5)*0.03; let sc = 1;
        if (havePtr){ const dx=baseX[i]-_v.x, dy=baseY[i]-_v.y, d=Math.sqrt(dx*dx+dy*dy);
          const lift = Math.exp(-d*d/0.5); z += lift*0.9; sc += lift*0.6; }
        dummy.position.set(baseX[i], baseY[i], z);
        dummy.scale.setScalar(sc); dummy.rotation.z = z*0.3;
        dummy.updateMatrix(); mesh.setMatrixAt(i, dummy.matrix);
      }
      mesh.instanceMatrix.needsUpdate = true;
    },
  };
}

// 05 — HALFTONE: 2D print-style dot grid, cursor sends a ripple ───────────────
function modeHalftone() {
  glCanvas.style.display = 'none'; fxCanvas.style.display = 'block';
  let bmp, bw, bh, step = 13, t = 0;
  function raster() {
    const w = innerWidth, h = innerHeight;
    const o = document.createElement('canvas'); o.width = w; o.height = h;
    const oc = o.getContext('2d');
    oc.fillStyle = '#000'; oc.textAlign='center'; oc.textBaseline='middle';
    let fs = h*0.62; oc.font = `700 ${fs}px "Playfair Display", Georgia, serif`;
    const tw = oc.measureText('CG').width; if (tw > w*0.8){ fs *= (w*0.8)/tw; oc.font = `700 ${fs}px "Playfair Display", Georgia, serif`; }
    oc.fillText('CG', w/2, h/2);
    bmp = oc.getImageData(0,0,w,h).data; bw=w; bh=h;
  }
  raster();
  return {
    resize(){ raster(); },
    dispose(){ glCanvas.style.display='block'; fxCanvas.style.display='none'; },
    update(dt){
      t += dt;
      const w=innerWidth, h=innerHeight;
      fx.clearRect(0,0,w,h);
      const inkCss = '#141414', accCss = '#8E1B0E';
      const px = pointer.active ? pointer.x : -9999, py = pointer.active ? pointer.y : -9999;
      for (let y=step/2; y<h; y+=step) for (let x=step/2; x<w; x+=step){
        const a = bmp[((y|0)*bw + (x|0))*4 + 3] / 255;
        if (a < 0.04) continue;
        let r = a*step*0.52;
        const dx=x-px, dy=y-py, dist=Math.sqrt(dx*dx+dy*dy);
        const ripple = Math.sin(dist*0.04 - t*6) * Math.exp(-dist/280);
        r *= 1 + ripple*0.9;
        if (r <= 0.2) continue;
        fx.beginPath(); fx.arc(x, y, r, 0, 6.283);
        fx.fillStyle = (dist < 90 && pointer.active) ? accCss : inkCss; fx.fill();
      }
    },
  };
}

// 06 — MORPH: particles flow between C · G · CG ───────────────────────────────
function modeMorph() {
  const N = 24000, worldH = 3.1, depth = 0.4;
  const seq = ['CG','C','G'];
  const targets = seq.map(txt => sampleGlyph(txt).points(N, worldH, depth));
  const pos = new Float32Array(targets[0]), vel = new Float32Array(N*3);
  const home = new Float32Array(N*3);
  const col = new Float32Array(N*3), size = new Float32Array(N);
  for (let i=0;i<N;i++){ const c=inkColor(0.05,0.05); col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;
    size[i]=0.03*(1+(Math.random()-0.5)*0.5); }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('aColor', new THREE.BufferAttribute(col,3));
  geo.setAttribute('aSize', new THREE.BufferAttribute(size,1));
  const mat = roundPoints(); const pts = new THREE.Points(geo,mat); pts.frustumCulled=false; modeGroup.add(pts);
  let t=0; const HOLD=2.2, MORPH=1.3, CYC=HOLD+MORPH;
  const ease = x => x<0.5 ? 4*x*x*x : 1 - Math.pow(-2*x+2,3)/2;
  return {
    resize(){ mat.uniforms.uPixelScale.value = pixelScale; },
    update(dt){
      t+=dt;
      if (!reduce) modeGroup.rotation.y = Math.sin(t*0.18)*0.3;
      // which pair are we between, and how far
      const phase = (t % (CYC*seq.length)) / CYC;
      const idx = Math.floor(phase); const local = phase - idx;
      const A = targets[idx % seq.length], B = targets[(idx+1) % seq.length];
      const m = local < HOLD/CYC ? 0 : ease((local - HOLD/CYC) / (MORPH/CYC));
      const havePtr=pointer.active; if (havePtr) pointerLocal(_v);
      const damp=Math.pow(0.85,dt*60);
      for (let i=0;i<N;i++){ const ix=i*3,iy=ix+1,iz=ix+2;
        home[ix]=A[ix]+(B[ix]-A[ix])*m; home[iy]=A[iy]+(B[iy]-A[iy])*m; home[iz]=A[iz]+(B[iz]-A[iz])*m;
        vel[ix]+=(home[ix]-pos[ix])*30*dt; vel[iy]+=(home[iy]-pos[iy])*30*dt; vel[iz]+=(home[iz]-pos[iz])*30*dt;
        if (havePtr){ const dx=pos[ix]-_v.x, dy=pos[iy]-_v.y, d2=dx*dx+dy*dy;
          if (d2<0.8){ const d=Math.sqrt(d2)+1e-4, f=24*(1-d/0.9); vel[ix]+=dx/d*f*dt; vel[iy]+=dy/d*f*dt; } }
        vel[ix]*=damp; vel[iy]*=damp; vel[iz]*=damp;
        pos[ix]+=vel[ix]*dt; pos[iy]+=vel[iy]*dt; pos[iz]+=vel[iz]*dt;
      }
      geo.attributes.position.needsUpdate=true;
    },
  };
}

// ── mode registry ─────────────────────────────────────────────────────────────
const registry = [
  { name: 'Field',         desc: 'A cloud of 34,000 points holds the monogram. Your cursor parts the ink and it springs back.', make: modeField },
  { name: 'Flow',          desc: 'The same points drift on a curl field — living ink smoke, tethered to the letterforms. The cursor swirls it.', make: modeFlow },
  { name: 'Constellation', desc: 'Nodes wired to their neighbours. The cursor is a gravity well that draws the lattice toward it.', make: modeConstellation },
  { name: 'Relief',        desc: 'The glyph built from lit, instanced cubes. The cursor raises a wave through the relief.', make: modeRelief },
  { name: 'Halftone',      desc: 'A print-style halftone in 2D. Dot size follows ink coverage; the cursor sends a ripple across the field.', make: modeHalftone },
  { name: 'Morph',         desc: 'Particles flow between C, G and the combined monogram. The cursor scatters them mid-transit.', make: modeMorph },
];
const modes = [];
let active = -1, current = null;

function switchTo(i) {
  if (i === active) return;
  current?.dispose?.();
  clearGroup(modeGroup);
  fx.clearRect(0, 0, innerWidth, innerHeight);
  active = i;
  current = registry[i].make();
  modes[i] = current;
  current.resize?.();
  // selector + modeline
  [...selectorEl.children].forEach((b, k) => b.classList.toggle('active', k === i));
  modeline.innerHTML = `<b>${registry[i].name}</b><span class="num">0${i+1} / 06</span> &nbsp; ${registry[i].desc}`;
}

// ── selector UI ────────────────────────────────────────────────────────────────
const selectorEl = document.getElementById('selector');
const modeline = document.getElementById('modeline');
registry.forEach((m, i) => {
  const b = document.createElement('button');
  b.innerHTML = `<span class="idx">0${i+1}</span>${m.name}`;
  b.onclick = () => switchTo(i);
  selectorEl.appendChild(b);
});
addEventListener('keydown', (e) => { const n = parseInt(e.key, 10); if (n>=1 && n<=registry.length) switchTo(n-1); });

// ── resize ─────────────────────────────────────────────────────────────────────
function resize() {
  const w = innerWidth, h = innerHeight, dpr = Math.min(devicePixelRatio, 2);
  renderer.setSize(w, h);                 // updateStyle:true → canvas CSS matches viewport
  camera.aspect = w / h; camera.updateProjectionMatrix();
  fxCanvas.width = w * dpr; fxCanvas.height = h * dpr;
  fxCanvas.style.width = w + 'px'; fxCanvas.style.height = h + 'px';
  fx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const dbh = renderer.getDrawingBufferSize(new THREE.Vector2()).y;
  pixelScale = dbh / (2 * Math.tan(camera.fov * Math.PI / 360));
  current?.resize?.();
}
addEventListener('resize', resize);

// ── boot ─────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
(async () => {
  await document.fonts.load('700 200px "Playfair Display"');
  await document.fonts.ready;
  resize();
  switchTo(0);
  document.querySelectorAll('.ui').forEach(el => el.classList.add('in'));
  clock.start();
  animate();
})().catch(err => { const e = document.getElementById('err'); e.style.display='block'; e.textContent = (err && err.stack) || String(err); });

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 1/30);
  current?.update(dt);
  if (fxCanvas.style.display !== 'block') renderer.render(scene, camera);
}

// expose for debugging
window.__demo = { switchTo, get active(){ return active; } };
</script>
